<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TerraVoyage</title>

    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            // Keep body hidden until main.js restores RTL class → no flash
            document.documentElement.classList.add('page-loading');
        })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: var(--space-4);
            position: relative;
            overflow: hidden;
        }

        .login-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        .login-card {
            background: var(--color-surface);
            width: 100%;
            max-width: 500px;
            padding: var(--space-6) var(--space-10);
            border-radius: 20px;
            border: 1px solid var(--color-border);
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-logo-wrapper {
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
        }

        .login-logo-wrapper img {
            width: 32px;
            height: 32px;
        }

        .login-logo-wrapper span {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 800;
            color: var(--color-text);
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: var(--space-1);
        }

        .welcome-emoji {
            font-size: 20px;
            margin-left: 6px;
        }

        .login-card p {
            color: var(--color-text-muted);
            margin-bottom: var(--space-6);
            font-size: 13px;
        }

        /* Social buttons - 2 Column Grid to save height */
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: var(--space-6);
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--color-border);
            background: var(--color-surface-alt);
            color: var(--color-text);
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-social:hover {
            background: var(--color-border);
            transform: translateY(-2px);
        }

        .btn-social svg {
            width: 18px;
            height: 18px;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--color-text-muted);
            font-size: 11px;
            margin-bottom: var(--space-6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .separator::before,
        .separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        .login-form {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .form-field label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--color-text-muted);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--color-accent);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--color-text-muted);
            cursor: pointer;
        }

        .remember-me input {
            accent-color: var(--color-accent);
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            font-size: 13px;
            color: var(--color-accent);
            text-decoration: none;
        }

        .login-footer {
            margin-top: var(--space-6);
            font-size: 13px;
            color: var(--color-text-muted);
        }

        .login-footer a {
            color: var(--color-accent);
            font-weight: 600;
        }

        .back-home {
            position: absolute;
            top: var(--space-6);
            left: var(--space-6);
            color: var(--color-text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            text-decoration: none;
        }

        .back-home:hover {
            color: var(--color-accent);
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-bg-overlay"></div>

        <a href="../index.html" class="back-home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Back to Home
        </a>

        <div class="login-card">
            <a href="../index.html" class="login-logo-wrapper">
                <img src="../assets/icons/logo.svg" alt="TerraVoyage Logo">
                <span>TerraVoyage</span>
            </a>
            <h1>Welcome Back <span class="welcome-emoji">👋</span></h1>
            <p>Access your journey logs and explorer dashboard.</p>

            <div class="social-buttons">
                <a href="#" class="btn-social">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.14-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </a>
                <a href="#" class="btn-social">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                        <path
                            d="M17.05 20.28c-.98.95-2.02 1.45-3.08 1.45-1.09 0-1.79-.35-2.72-.35-.96 0-1.75.35-2.73.35-1.04 0-2.14-.53-3.17-1.53C3.26 18.15 2 14.95 2 11.95c0-3.04 2.01-4.75 3.96-4.75.98 0 1.83.35 2.58.35.73 0 1.34-.35 2.56-.35 1.87 0 3.46 1.33 3.46 3.33-.03.02-.05.04-.08.07a4.01 4.01 0 0 1-2.4 3.63c.06 1.61.98 3.55 2.57 5.04.14.15.34.25.4.37-.1.08-.2.13-.3.23zM12.03 7.25c-.15-2.23 1.66-4.07 3.61-4.25.26 2.27-1.85 4.14-3.61 4.25z" />
                    </svg>
                    Apple
                </a>
            </div>

            <div class="separator">OR</div>

            <form class="login-form">
                <div class="form-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="explorer@terravoyage.com" required>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                                <path d="M10.73 5.08a10.43 10.43 0 0 1 1.27-.08c7 0 10 7 10 7a9.96 9.96 0 0 1-2.23 3.23"/>
                                <path d="M1 1l22 22"/>
                                <path d="M4.34 8.79a9.89 9.89 0 0 0-2.34 3.21S5 19 12 19a9.98 9.98 0 0 0 4.88-1.55"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
            </form>

            <div class="login-footer">
                Don't have an account? <a href="registration.html">Create Exploration Account</a>
            </div>
        </div>
    </div>
    <script src="../assets/js/main.js"></script>
    <script>
        // Password Visibility Toggle
        document.getElementById('password-toggle').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = this.querySelector('.eye-icon');
            const eyeOffIcon = this.querySelector('.eye-off-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                passwordInput.type = 'password';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        });
    </script>
</body>

</html>
