<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TerraVoyage</title>

    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            // Keep body hidden until main.js restores RTL class → no flash
            document.documentElement.classList.add('page-loading');
        })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: var(--space-4);
            position: relative;
            overflow: hidden;
        }

        .login-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.05) 0%, transparent 70%);
            z-index: 1;
        }

        .login-card {
            background: var(--color-surface);
            width: 100%;
            max-width: 450px;
            padding: var(--space-10);
            border-radius: 20px;
            border: 1px solid var(--color-border);
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-logo {
            margin-bottom: var(--space-6);
            display: inline-block;
        }

        .login-logo img {
            width: 64px;
            height: 64px;
        }

        .login-card h1 {
            font-size: 32px;
            margin-bottom: var(--space-2);
        }

        .login-card p {
            color: var(--color-text-muted);
            margin-bottom: var(--space-8);
            font-size: 14px;
        }

        .login-form {
            text-align: left;
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--color-accent);
            margin-top: -12px;
            margin-bottom: var(--space-6);
        }

        .login-footer {
            margin-top: var(--space-8);
            font-size: 13px;
            color: var(--color-text-muted);
        }

        .login-footer a {
            color: var(--color-accent);
            font-weight: 600;
        }

        .back-home {
            position: absolute;
            top: var(--space-6);
            left: var(--space-6);
            color: var(--color-text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .back-home:hover {
            color: var(--color-accent);
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-bg-overlay"></div>

        <a href="../index.html" class="back-home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Back to Home
        </a>

        <div class="login-card">
            <div class="login-logo">
                <img src="../assets/icons/logo.svg" alt="TerraVoyage Logo">
            </div>
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access your journey logs and explorer dashboard.</p>

            <form class="login-form">
                <div class="form-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="explorer@terravoyage.com" required>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <a href="#" class="forgot-password">Forgot Password?</a>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 16px;">Sign In</button>
            </form>

            <div class="login-footer">
                Don't have an account? <a href="registration.html">Create Exploration Account</a>
            </div>
        </div>
    </div>
    <script src="../assets/js/main.js"></script>
</body>

</html>
