<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | TerraVoyage</title>
    <meta name="description" content="TerraVoyage is preparing to launch a new era of cinematic travel exploration. Stay tuned for something amazing.">

    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">

    <style>
        .coming-soon-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            position: relative;
            overflow: hidden;
            padding: var(--space-10) var(--space-4);
            text-align: center;
        }

        /* Animated Background Overlay */
        .cs-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.08) 0%, transparent 70%);
            z-index: 1;
            animation: pulseBg 10s ease-in-out infinite alternate !important;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        .cs-container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            width: 100%;
        }

        .cs-brand {
            margin-bottom: var(--space-10);
            display: inline-flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInCS 0.8s ease forwards 0.2s !important;
        }

        .cs-brand img {
            width: 48px;
            height: 48px;
        }

        .cs-brand span {
            font-family: var(--font-heading);
            font-size: 28px;
            font-weight: 800;
            color: var(--color-text);
            letter-spacing: 1px;
        }

        .cs-content h1 {
            font-family: var(--font-heading);
            font-size: clamp(36px, 8vw, 72px);
            line-height: 1.1;
            margin-bottom: var(--space-4);
            color: var(--color-text);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCS 0.8s ease forwards 0.4s !important;
        }

        .cs-content p {
            font-size: clamp(16px, 2vw, 20px);
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto var(--space-10);
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCS 0.8s ease forwards 0.6s !important;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: center;
            gap: var(--space-4);
            margin-bottom: var(--space-12);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCS 0.8s ease forwards 0.8s !important;
        }

        .countdown-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            padding: var(--space-4);
            border-radius: 16px;
            min-width: 100px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .countdown-val {
            display: block;
            font-size: 32px;
            font-weight: 700;
            color: var(--color-accent);
            font-family: var(--font-heading);
            line-height: 1;
            margin-bottom: 4px;
        }

        .countdown-lbl {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-text-muted);
            font-weight: 600;
        }

        @media (max-width: 500px) {
            .countdown {
                gap: 12px;
            }
            .countdown-item {
                min-width: 70px;
                padding: 12px;
            }
            .countdown-val {
                font-size: 24px;
            }
            .countdown-lbl {
                font-size: 9px;
            }
        }

        /* Subscription Form */
        .cs-subscribe {
            max-width: 500px;
            margin: 0 auto var(--space-10);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInCS 0.8s ease forwards 1s !important;
        }

        .subscribe-form {
            display: flex;
            gap: 12px;
            background: var(--color-surface);
            padding: 8px;
            border-radius: 50px;
            border: 1px solid var(--color-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .subscribe-form input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 24px;
            font-family: var(--font-body);
            color: var(--color-text);
            font-size: 15px;
        }

        .subscribe-form input:focus {
            outline: none;
        }

        .subscribe-form button {
            background: var(--color-accent);
            color: #FFF;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subscribe-form button:hover {
            background: var(--color-accent-hover);
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            .subscribe-form {
                flex-direction: column;
                background: transparent;
                border: none;
                padding: 0;
                box-shadow: none;
                gap: 16px;
            }
            .subscribe-form input {
                background: var(--color-surface);
                height: 54px;
                border: 1px solid var(--color-border);
                border-radius: 50px;
                text-align: center;
            }
            .subscribe-form button {
                height: 54px;
            }
        }

        /* Social Links */
        .cs-social {
            display: flex;
            justify-content: center;
            gap: 24px;
            opacity: 0;
            animation: fadeInCS 0.8s ease forwards 1.2s !important;
        }

        .cs-social a {
            color: var(--color-text-muted);
            transition: all 0.3s ease;
        }

        .cs-social a:hover {
            color: var(--color-accent);
            transform: translateY(-3px);
        }

        @keyframes fadeInCS {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        [data-theme="dark"] .cs-bg-overlay {
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
        }
    </style>
</head>

<body>
    <div class="coming-soon-wrapper">
        <div class="cs-bg-overlay"></div>

        <div class="cs-container">
            <a href="../index.html" class="cs-brand">
                <img src="../assets/icons/logo.svg" alt="TerraVoyage Logo">
                <span>TerraVoyage</span>
            </a>

            <div class="cs-content">
                <h1>Something Amazing is Coming Soon</h1>
                <p>We’re working hard to refine the ultimate cinematic exploration experience. Stay tuned for a launch that will redefine how you see the world.</p>
            </div>

            <div class="countdown" id="countdown">
                <div class="countdown-item">
                    <span class="countdown-val" id="days">00</span>
                    <span class="countdown-lbl">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-val" id="hours">00</span>
                    <span class="countdown-lbl">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-val" id="minutes">00</span>
                    <span class="countdown-lbl">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-val" id="seconds">00</span>
                    <span class="countdown-lbl">Seconds</span>
                </div>
            </div>

            <div class="cs-subscribe">
                <form class="subscribe-form" id="subscribe-form">
                    <input type="email" placeholder="Enter your email address" required>
                    <button type="submit">Notify Me</button>
                </form>
                <div id="subscription-status" style="margin-top: 16px; font-size: 14px; color: var(--color-accent); display: none;">
                    Success! You'll be the first to know.
                </div>
            </div>

            <div class="cs-social">
                <a href="#" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
                    </svg>
                </a>
                <a href="#" aria-label="YouTube">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.4a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" />
                        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" />
                    </svg>
                </a>
                <a href="#" aria-label="X / Twitter">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="currentColor">
                        <path
                            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L2.25 2.25h6.897l4.264 5.638 5.833-5.638Zm-1.161 17.52h1.833L7.084 4.126H5.117Z" />
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Countdown Logic
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30); // 30 days from now

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown").innerHTML = "🚀 We're Live!";
            }
        }

        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);

        // Subscription form handler
        document.getElementById("subscribe-form").addEventListener("submit", function(e) {
            e.preventDefault();
            this.style.display = "none";
            document.getElementById("subscription-status").style.display = "block";
        });
    </script>
</body>

</html>
