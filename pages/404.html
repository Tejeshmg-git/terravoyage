<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found | TerraVoyage</title>

    <!-- Theme initialization -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.classList.add('page-loading');
        })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">

    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-20) var(--space-6);
            text-align: center;
            background: var(--color-bg);
            position: relative;
            overflow: hidden;
        }

        .error-bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.08) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        .error-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(80px, 15vw, 150px);
            font-weight: 800;
            line-height: 1;
            margin-bottom: var(--space-4);
            background: linear-gradient(to bottom, var(--color-text), var(--color-text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        .error-title {
            font-family: var(--font-heading);
            font-size: clamp(28px, 5vw, 42px);
            margin-bottom: var(--space-6);
            color: var(--color-text);
        }

        .error-message {
            color: var(--color-text-muted);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: var(--space-10);
        }

        .error-btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
    </style>
</head>

<body class="error-page-mobile">

    <main>
        <section class="error-section">
            <div class="error-bg-glow"></div>
            <div class="error-content">
                <div class="error-code">404</div>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-message">
                    The path you followed doesn’t lead anywhere. Let’s guide you back to the narrative.
                </p>
                <a href="../index.html" class="btn-primary error-btn">Return Home</a>
            </div>
        </section>
    </main>

    <script src="../assets/js/main.js"></script>
</body>

</html>
